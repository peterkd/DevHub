<main class="page">
  <section class="composer">
    <header class="hero">
      <h1>HTML Email Composer</h1>
      <p>Craft polished, rich-text emails and send them through Microsoft Graph.</p>
    </header>

    <div class="form-grid">
      <label>
        To (comma-separated)
        <input
          type="text"
          name="toRecipients"
          [(ngModel)]="toRecipients"
          placeholder="recipient1@contoso.com, recipient2@contoso.com"
        />
      </label>

      <label>
        Subject
        <input type="text" name="subject" [(ngModel)]="subject" placeholder="Quarterly update" />
      </label>

      <label>
        Organization role
        <select
          name="organizationRole"
          [(ngModel)]="selectedOrganizationRole"
          [disabled]="isLoadingOrganizationRoles || organizationRoles.length === 0"
        >
          <option value="">Select organization role</option>
          @for (organizationRole of organizationRoles; track organizationRole) {
            <option [value]="organizationRole">{{ organizationRole }}</option>
          }
        </select>
      </label>
    </div>

    <div class="toolbar-row">
      <label class="image-input">
        <span>Insert image</span>
        <input type="file" accept="image/*" (change)="insertImage($event)" />
      </label>
      <label class="sql-option">
        <input
          type="checkbox"
          name="includeSqlRecipients"
          [(ngModel)]="includeSqlRecipients"
        />
        <span>Include SQL recipient list</span>
      </label>
      <small>Tip: SQL recipients are loaded by selected organization role and appended when checked.</small>
    </div>

    <section class="editor-shell">
      <h2>Message body</h2>
      <quill-editor
        [(ngModel)]="bodyHtml"
        name="bodyHtml"
        [modules]="editorModules"
        [style]="{ height: '420px' }"
        format="html"
        placeholder="Compose HTML email body..."
      ></quill-editor>
    </section>

    <div class="actions">
      <button type="button" (click)="sendMail()" [disabled]="isSending">
        {{ isSending ? 'Sending...' : 'Send email' }}
      </button>
      <span class="status">{{ statusMessage }}</span>
    </div>
  </section>
</main>
