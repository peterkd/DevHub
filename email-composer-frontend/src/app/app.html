<main class="page">
  <section class="composer">
    <header class="hero">
      <h1>HTML Email Composer</h1>
      <p>Craft polished, rich-text emails and send them through Microsoft Graph.</p>
    </header>

    <div class="form-grid">
      <label>
        To (comma-separated)
        <input
          type="text"
          name="toRecipients"
          [(ngModel)]="toRecipients"
          placeholder="recipient1@contoso.com, recipient2@contoso.com"
        />
      </label>

      <label>
        Subject
        <input type="text" name="subject" [(ngModel)]="subject" placeholder="Quarterly update" />
      </label>
    </div>

    <div class="toolbar-row">
      <label class="image-input">
        <span>Insert image</span>
        <input type="file" accept="image/*" (change)="insertImage($event)" />
      </label>
      <label class="sql-option">
        <input
          type="checkbox"
          name="includeSqlRecipients"
          [(ngModel)]="includeSqlRecipients"
          (ngModelChange)="onIncludeSqlRecipientsChanged($event)"
        />
        <span>Include SQL recipient list</span>
      </label>
      <label class="sql-role">
        <span>Organization role</span>
        <select
          name="organizationRole"
          [(ngModel)]="organizationRole"
          [disabled]="!includeSqlRecipients || isLoadingOrganizationRoles || organizationRoles.length === 0"
        >
          <option value="">
            {{
              isLoadingOrganizationRoles
                ? 'Loading organization roles...'
                : organizationRoles.length === 0
                  ? 'No organization roles available'
                  : 'Select an organization role'
            }}
          </option>
          <option *ngFor="let organizationRoleOption of organizationRoles" [value]="organizationRoleOption">
            {{ organizationRoleOption }}
          </option>
        </select>
      </label>
      <small>Tip: SQL recipients are appended to manual recipients when checked.</small>
    </div>

    <small class="sql-role-message" *ngIf="organizationRoleMessage">{{ organizationRoleMessage }}</small>

    <section class="editor-shell">
      <h2>Message body</h2>
      <quill-editor
        [(ngModel)]="bodyHtml"
        name="bodyHtml"
        [modules]="editorModules"
        [style]="{ height: '420px' }"
        format="html"
        placeholder="Compose HTML email body..."
      ></quill-editor>
    </section>

    <div class="actions">
      <button type="button" (click)="sendMail()" [disabled]="isSending">
        {{ isSending ? 'Sending...' : 'Send email' }}
      </button>
      <span class="status">{{ statusMessage }}</span>
    </div>
  </section>
</main>
