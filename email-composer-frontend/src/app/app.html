<main class="page">
  <section class="composer">
    <header class="hero">
      <h1>HTML Email Composer</h1>
      <p>Craft polished, rich-text emails and send them through Microsoft Graph.</p>
    </header>

    <div class="roles-grid">
      <label>
        Organization role
        <select
          name="organizationRole"
          [(ngModel)]="selectedOrganizationRole"
          (ngModelChange)="onOrganizationRoleChange()"
          [disabled]="isLoadingOrganizationRoles || organizationRoles.length === 0"
        >
          @if (isLoadingOrganizationRoles) {
            <option value="">Loading roles...</option>
          } @else if (organizationRoles.length === 0) {
            <option value="">No roles available</option>
          } @else {
            @for (role of organizationRoles; track role) {
              <option [value]="role">{{ role }}</option>
            }
          }
        </select>
      </label>

      <label>
        User role
        <select
          name="userRole"
          [(ngModel)]="selectedUserRole"
          [disabled]="
            isLoadingUserRoles ||
            !selectedOrganizationRole ||
            userRoles.length === 0
          "
        >
          @if (isLoadingUserRoles) {
            <option value="">Loading roles...</option>
          } @else if (!selectedOrganizationRole) {
            <option value="">Select an organization role first</option>
          } @else if (userRoles.length === 0) {
            <option value="">No user roles available</option>
          } @else {
            @for (role of userRoles; track role) {
              <option [value]="role">{{ role }}</option>
            }
          }
        </select>
      </label>
    </div>

    <div class="form-grid">
      <label>
        To (comma-separated)
        <input
          type="text"
          name="toRecipients"
          [(ngModel)]="toRecipients"
          placeholder="recipient1@contoso.com, recipient2@contoso.com"
        />
      </label>

      <label>
        Subject
        <input type="text" name="subject" [(ngModel)]="subject" placeholder="Quarterly update" />
      </label>
    </div>

    <div class="toolbar-row">
      <label class="image-input">
        <span>Insert image</span>
        <input type="file" accept="image/*" (change)="insertImage($event)" />
      </label>
      <small>Tip: images are embedded inline in the HTML body.</small>
    </div>

    <section class="editor-shell">
      <h2>Message body</h2>
      <quill-editor
        [(ngModel)]="bodyHtml"
        name="bodyHtml"
        [modules]="editorModules"
        [style]="{ height: '340px' }"
        format="html"
        placeholder="Compose HTML email body..."
      ></quill-editor>
    </section>

    <div class="actions">
      <button type="button" (click)="sendMail()" [disabled]="isSending">
        {{ isSending ? 'Sending...' : 'Send email' }}
      </button>
      <span class="status">{{ statusMessage }}</span>
    </div>
  </section>
</main>
