<main class="page">
  <section class="composer">
    <h1>HTML Email Composer</h1>
    <p>Write a rich email body, insert local images, and send through Graph API.</p>

    <label>
      To (comma-separated)
      <input
        type="text"
        name="toRecipients"
        [(ngModel)]="toRecipients"
        placeholder="recipient1@contoso.com, recipient2@contoso.com"
      />
    </label>

    <label>
      Subject
      <input type="text" name="subject" [(ngModel)]="subject" placeholder="Email subject" />
    </label>

    <label class="image-input">
      Insert image
      <input type="file" accept="image/*" (change)="insertImage($event)" />
    </label>

    <quill-editor
      [(ngModel)]="bodyHtml"
      name="bodyHtml"
      [modules]="editorModules"
      [style]="{ height: '320px' }"
      format="html"
      placeholder="Compose HTML email body..."
    ></quill-editor>

    <div class="actions">
      <button type="button" (click)="sendMail()" [disabled]="isSending">
        {{ isSending ? 'Sending...' : 'Send email' }}
      </button>
      <span class="status">{{ statusMessage }}</span>
    </div>
  </section>
</main>
